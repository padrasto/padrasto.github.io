mainSections   = ["post"]
rssFullContent = true

[footer]
    since = 2026

[sidebar]
    emoji    = "🐧"
    subtitle = "Linux sysadmin notes, homelab experiments, and open-source tools."
    avatar   = "img/avatar.jpeg"

[article]
    toc         = true
    readingTime = true
    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    enabled = false

[colorScheme]
    toggle  = true
    default = "dark"
